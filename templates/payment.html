<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><title>Renew Plan</title></head><body class='bg-dark text-light'>
<div class='container py-4' style='max-width:780px'>
<h3>Renew VideoTracker Plan</h3><p>Price: <strong>₹{{ price_inr }}/month</strong></p>
<p>Scan the UPI QR and complete payment, then upload screenshot + transaction ID.</p>
<img src='{{ url_for("static", filename="upi-qr.png") }}' onerror="this.style.display='none'" class='img-fluid mb-3' alt='UPI QR'>
<form method='post' action='{{ url_for("submit_payment") }}' enctype='multipart/form-data' class='card card-body bg-secondary-subtle'>
  <label class='form-label'>Transaction ID</label><input class='form-control mb-2' name='transaction_id' required>
  <label class='form-label'>Payment Screenshot</label><input class='form-control mb-3' type='file' name='payment_screenshot' accept='.png,.jpg,.jpeg,.webp,.pdf' required>
  <button class='btn btn-primary'>Submit for review</button>
</form>
{% if latest %}<div class='alert alert-info mt-3'>Latest status: <strong>{{ latest.status }}</strong> (Txn: {{ latest.transaction_id }})</div>{% endif %}
<a href='{{ url_for("home") }}' class='btn btn-link text-light mt-2'>Back</a>
</div></body></html>
