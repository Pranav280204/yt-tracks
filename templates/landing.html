<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VideoTracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f172a,#1e293b);color:#f8fafc;font-family:Inter,Segoe UI,Roboto,sans-serif}
    .hero{width:min(760px,92%);text-align:center;background:rgba(15,23,42,.55);border:1px solid rgba(148,163,184,.35);border-radius:20px;padding:2.2rem;box-shadow:0 20px 60px rgba(2,6,23,.45)}
    h1{font-weight:800;margin-bottom:.75rem}
    p{color:#cbd5e1;max-width:62ch;margin:0 auto 1.35rem}
  </style>
</head>
<body>
  <main class="hero">
    <h1>Track YouTube growth with clarity</h1>
    <p>VideoTracker helps you monitor video performance, compare trends over time, and act faster with reliable analytics.</p>
    <a class="btn btn-light btn-lg px-4" href="{{ url_for('login') }}">Login</a>
  </main>
</body>
</html>
